name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build APK with Buildozer Docker
        run: |
          docker run --rm \
            --entrypoint /bin/bash \
            -v "$PWD":/home/user/hostcwd \
            -w /home/user/hostcwd \
            kivy/buildozer \
            -c "export BUILDOZER_ALLOW_KIVY_BUILD_FROM_ROOT=1 && yes | buildozer android debug"



      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DarfurSongs-APK
          path: bin/*.apk
