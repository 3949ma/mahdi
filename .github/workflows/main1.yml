name: Build Android App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04 # تحديد نسخة نظام تشغيل مستقرة ومجربة

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # هنا الحل: إجبار الخادم على استخدام إصدار قديم ومضمون يحتوي على مكتبة cgi الأصلية
    - name: Set up Python 3.10.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.10.11' 

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # تثبيت متطلبات بيئة البناء الأساسية
        pip install "cython<3.0" buildozer setuptools legacy-cgi

    - name: Install System Packages
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libffi-dev

    - name: Build with Buildozer
      run: |
        # تشغيل البناء مباشرة
        buildozer android debug
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
